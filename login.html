<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sign in — LeadFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>try{if(localStorage.getItem('lf-theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background:radial-gradient(circle at 30% 20%, #0d3163 0%, #07224b 60%);">

  <div class="w-full max-w-[420px] bg-white rounded-2xl p-8 shadow-2xl">
    <!-- Brand -->
    <div class="flex items-center gap-3 mb-2">
      <div class="brand-logo">
        <i data-lucide="zap" style="color:white;width:18px;height:18px;"></i>
      </div>
      <span class="text-[20px] font-bold tracking-tight">LeadFlow</span>
    </div>
    <p id="auth-subtitle" class="text-[13.5px] text-muted mb-6">Sign in to continue to your dashboard.</p>

    <!-- Login form -->
    <form id="login-form" class="flex flex-col gap-3">
      <div>
        <label class="text-[12px] font-semibold text-muted">Email</label>
        <input name="email" type="email" required autocomplete="email" class="input mt-1" placeholder="you@example.com" />
      </div>
      <div>
        <label class="text-[12px] font-semibold text-muted">Password</label>
        <input name="password" type="password" required autocomplete="current-password" class="input mt-1" placeholder="••••••••" />
      </div>
      <div id="login-error" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
      <button type="submit" class="btn-primary mt-1" style="justify-content:center;padding:11px;font-size:14px;">Sign In</button>
    </form>

    <!-- Two-factor code step (shown only when the account has 2FA on) -->
    <form id="mfa-form" class="flex-col gap-3 hidden">
      <p class="text-[13px] text-muted">Enter the 6-digit code from your authenticator app. You can also use one of your backup codes.</p>
      <div>
        <label class="text-[12px] font-semibold text-muted">Verification code</label>
        <input id="mfa-code" autocomplete="one-time-code" maxlength="20" class="input mt-1" placeholder="123456" />
      </div>
      <div id="mfa-error" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
      <button type="submit" class="btn-primary mt-1" style="justify-content:center;padding:11px;font-size:14px;">Verify</button>
      <button type="button" id="mfa-back" class="text-[12.5px] text-muted text-center" style="cursor:pointer;background:none;border:none;">← Back to sign in</button>
    </form>

    <p class="text-[12px] text-muted mt-5 text-center">
      Need an account? Your administrator creates it for you and emails a temporary password.
    </p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
