<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtor Portal — LeadFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>try{if(localStorage.getItem('lf-theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Loading -->
  <div id="rp-loading" class="text-[13px] text-muted py-16 text-center">Loading…</div>

  <!-- Portal shell (sidebar + topbar + content) -->
  <div id="rp-shell" class="hidden">
    <div class="flex" style="height:100vh;overflow:hidden;">
      <!-- Sidebar -->
      <aside id="rp-sidebar" class="sidebar flex-shrink-0 flex flex-col" style="height:100vh;">
        <div class="px-5 pt-5 pb-3 flex items-center gap-3 flex-shrink-0">
          <div class="brand-logo"><i data-lucide="home" style="color:white;width:18px;height:18px;"></i></div>
          <span class="brand-text text-white text-[17px] font-bold tracking-tight">LeadFlow</span>
        </div>
        <nav id="rp-nav" class="px-3 mt-2 flex-1 flex flex-col gap-1 overflow-y-auto min-h-0"></nav>
      </aside>

      <!-- Main -->
      <div class="flex-1 flex flex-col min-w-0" style="height:100vh;">
        <header class="topbar h-[60px] flex-shrink-0 flex items-center px-6 gap-3">
          <div class="flex-1"></div>
          <button id="rp-chat-btn" class="btn-icon relative" title="Chat with your loan officer">
            <i data-lucide="message-circle" style="width:16px;height:16px;color:var(--text-muted);"></i>
            <span id="rp-chat-badge" class="absolute -top-1 -right-1 bg-[#E64B4B] text-white text-[10px] font-bold rounded-full hidden items-center justify-center" style="min-width:16px;height:16px;padding:0 3px;"></span>
          </button>
          <button id="rp-theme" class="theme-toggle" title="Toggle dark mode">
            <i data-lucide="moon" style="width:16px;height:16px;color:var(--text-muted);"></i>
          </button>
          <div class="relative" id="rp-user-menu">
            <button id="rp-user-btn" class="flex items-center gap-2 pl-2 pr-3 py-1 rounded-lg hover:bg-[#FAFAFC]" style="cursor:pointer;">
              <div id="rp-avatar" class="avatar"></div>
              <div class="leading-tight text-left">
                <div id="rp-user-name" class="text-[13px] font-semibold"></div>
                <div class="text-[11px] text-soft">Realtor</div>
              </div>
              <i data-lucide="chevron-down" style="width:14px;height:14px;color:var(--text-muted);margin-left:2px;"></i>
            </button>
            <div id="rp-user-dropdown" class="hidden absolute right-0 mt-2 panel" style="top:100%;min-width:200px;z-index:30;box-shadow:0 8px 28px rgba(0,0,0,.10);">
              <div class="px-4 py-3" style="border-bottom:1px solid var(--border);">
                <div class="text-[11.5px] text-muted">Signed in as</div>
                <div id="rp-user-email" class="text-[13px] font-semibold truncate"></div>
              </div>
              <button id="rp-logout" class="w-full text-left px-4 py-3 hover:bg-[#FAFAFC] text-[13px] font-medium flex items-center gap-2" style="color:#D63333;">
                <i data-lucide="log-out" style="width:14px;height:14px;"></i> Sign out
              </button>
            </div>
          </div>
        </header>

        <main id="rp-view" class="flex-1 p-6 overflow-y-auto min-h-0"></main>
      </div>
    </div>
  </div>

  <!-- Hidden file inputs for import -->
  <input id="rl-file" type="file" accept=".csv,.xls,.xlsx" style="display:none;" />
  <input id="pc-file" type="file" accept=".csv,.xls,.xlsx" style="display:none;" />

  <!-- Add / capture a lead -->
  <div id="rl-modal" class="hidden" style="position:fixed;inset:0;z-index:56;">
    <div id="rl-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:620px;" class="px-4">
      <div class="bg-white rounded-2xl p-6 shadow-2xl" style="max-height:88vh;overflow-y:auto;">
        <div class="flex items-center justify-between mb-1">
          <h3 id="rl-modal-title" class="text-[17px] font-bold">Add a lead</h3>
          <button id="rl-close" class="btn-icon" style="width:32px;height:32px;border:none;"><i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i></button>
        </div>
        <p class="text-[12.5px] text-muted mb-4">Capture the details while you're on the call — only a name is required.</p>
        <form id="rl-form" class="flex flex-col gap-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Name</label>
              <input name="name" required maxlength="120" class="input mt-1" placeholder="Who are you speaking with?" />
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Phone</label>
              <input name="phone" maxlength="40" class="input mt-1" placeholder="(555) 123-4567" />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Email</label>
              <input name="email" type="email" maxlength="160" class="input mt-1" placeholder="name@email.com" />
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Are they buying or selling?</label>
              <select name="intent" class="input mt-1" style="cursor:pointer;">
                <option value="">Select…</option>
                <option value="Buying">Buying</option>
                <option value="Selling">Selling</option>
                <option value="Both">Both</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">How soon are they looking?</label>
              <select name="timeline" class="input mt-1" style="cursor:pointer;">
                <option value="">Select…</option>
                <option>ASAP</option>
                <option>1-3 months</option>
                <option>3-6 months</option>
                <option>6+ months</option>
                <option>Just browsing</option>
              </select>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Budget / price range</label>
              <input name="budget" maxlength="60" class="input mt-1" placeholder="e.g. $400k–$500k" />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Property type</label>
              <select name="propertyType" class="input mt-1" style="cursor:pointer;">
                <option value="">Select…</option>
                <option>Single-family</option>
                <option>Condo</option>
                <option>Townhouse</option>
                <option>Multi-family</option>
                <option>Land</option>
                <option>Other</option>
              </select>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Preferred area / location</label>
              <input name="area" maxlength="120" class="input mt-1" placeholder="Neighborhood, city…" />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">ZIP code</label>
              <input name="zipcode" maxlength="20" class="input mt-1" placeholder="e.g. 48104" />
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Financing</label>
              <select name="financing" class="input mt-1" style="cursor:pointer;">
                <option value="">Select…</option>
                <option>Pre-approved</option>
                <option>Needs a lender</option>
                <option>Paying cash</option>
                <option>Not sure</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Credit score</label>
              <select name="creditScore" class="input mt-1" style="cursor:pointer;">
                <option value="">Select…</option>
                <option value="&lt;580">&lt;580</option>
                <option value="581-620">581-620</option>
                <option value="621-680">621-680</option>
                <option value="681-740">681-740</option>
                <option value="741+">741+</option>
              </select>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Assets available</label>
              <input name="assets" maxlength="120" class="input mt-1" placeholder="Cash on hand" />
            </div>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Notes</label>
            <textarea name="notes" rows="3" maxlength="2000" class="input mt-1" placeholder="Anything else they mentioned…"></textarea>
          </div>
          <div id="rl-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
          <div class="flex items-center justify-end gap-2 mt-1">
            <button type="button" id="rl-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" id="rl-submit" class="btn-primary">Add lead</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Contact action menu (Call / Text / WhatsApp / Email) -->
  <div id="rc-menu" class="hidden" style="position:fixed;z-index:60;min-width:190px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px var(--shadow);padding:6px;"></div>

  <!-- Add / edit contact -->
  <div id="rc-modal" class="hidden" style="position:fixed;inset:0;z-index:57;">
    <div id="rc-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:460px;" class="px-4">
      <div class="bg-white rounded-2xl p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-4">
          <h3 id="rc-modal-title" class="text-[17px] font-bold">Add contact</h3>
          <button id="rc-close" class="btn-icon" style="width:32px;height:32px;border:none;"><i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i></button>
        </div>
        <form id="rc-form" class="flex flex-col gap-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Name</label>
              <input name="name" required maxlength="120" class="input mt-1" placeholder="Contact's name" />
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Type</label>
              <select name="tag" class="input mt-1" style="cursor:pointer;">
                <option>Contact</option>
                <option>Buyer</option>
                <option>Seller</option>
                <option>Investor</option>
                <option>Lender</option>
                <option>Vendor</option>
                <option>Other</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Email</label>
              <input name="email" type="email" maxlength="160" class="input mt-1" placeholder="name@email.com" />
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Phone</label>
              <input name="phone" maxlength="40" class="input mt-1" placeholder="(555) 123-4567" />
            </div>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Company</label>
            <input name="company" maxlength="120" class="input mt-1" placeholder="Company / brokerage" />
          </div>
          <div id="rc-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
          <div class="flex items-center justify-end gap-2 mt-1">
            <button type="button" id="rc-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" id="rc-submit" class="btn-primary">Add contact</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Contact / lead detail -->
  <div id="rc-detail" class="hidden" style="position:fixed;inset:0;z-index:57;">
    <div id="rc-detail-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:460px;" class="px-4">
      <div class="bg-white rounded-2xl p-6 shadow-2xl" style="max-height:85vh;overflow-y:auto;">
        <div class="flex items-center justify-between mb-3">
          <h3 id="rc-detail-title" class="text-[17px] font-bold">Details</h3>
          <button id="rc-detail-close" class="btn-icon" style="width:32px;height:32px;border:none;"><i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i></button>
        </div>
        <div id="rc-detail-body"></div>
      </div>
    </div>
  </div>

  <!-- Close a lead → past client -->
  <div id="rx-modal" class="hidden" style="position:fixed;inset:0;z-index:57;">
    <div id="rx-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:460px;" class="px-4">
      <div class="bg-white rounded-2xl p-6 shadow-2xl" style="max-height:88vh;overflow-y:auto;">
        <div class="flex items-center justify-between mb-1">
          <h3 class="text-[17px] font-bold">Close lead</h3>
          <button id="rx-close" class="btn-icon" style="width:32px;height:32px;border:none;"><i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i></button>
        </div>
        <p id="rx-who" class="text-[12.5px] text-muted mb-4"></p>
        <div class="flex flex-col gap-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Deal</label>
              <select id="rx-deal" class="input mt-1" style="cursor:pointer;">
                <option value="">Select…</option>
                <option>Bought</option>
                <option>Sold</option>
                <option>Both</option>
              </select>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Closed date</label>
              <input id="rx-date" type="date" class="input mt-1" style="cursor:pointer;" />
            </div>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Property address</label>
            <input id="rx-address" maxlength="200" class="input mt-1" placeholder="123 Main St, City" />
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Sale price</label>
            <input id="rx-price" maxlength="60" class="input mt-1" placeholder="e.g. $450,000" />
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Notes</label>
            <textarea id="rx-notes" rows="2" maxlength="2000" class="input mt-1" placeholder="Anything to remember about this client…"></textarea>
          </div>
          <div id="rx-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
          <div class="flex items-center justify-end gap-2 mt-1">
            <button type="button" id="rx-cancel" class="btn-secondary">Cancel</button>
            <button type="button" id="rx-save" class="btn-primary">Close lead</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit past client -->
  <div id="pc-modal" class="hidden" style="position:fixed;inset:0;z-index:57;">
    <div id="pc-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:460px;" class="px-4">
      <div class="bg-white rounded-2xl p-6 shadow-2xl" style="max-height:88vh;overflow-y:auto;">
        <div class="flex items-center justify-between mb-4">
          <h3 id="pc-modal-title" class="text-[17px] font-bold">Edit past client</h3>
          <button id="pc-close" class="btn-icon" style="width:32px;height:32px;border:none;"><i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i></button>
        </div>
        <form id="pc-form" class="flex flex-col gap-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Name</label>
              <input name="name" required maxlength="120" class="input mt-1" />
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Phone</label>
              <input name="phone" maxlength="40" class="input mt-1" />
            </div>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Email</label>
            <input name="email" type="email" maxlength="160" class="input mt-1" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[12px] font-semibold text-muted">Deal</label>
              <select name="dealType" class="input mt-1" style="cursor:pointer;">
                <option value="">Select…</option>
                <option>Bought</option>
                <option>Sold</option>
                <option>Both</option>
              </select>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Closed date</label>
              <input name="closedDate" type="date" class="input mt-1" style="cursor:pointer;" />
            </div>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Property address</label>
            <input name="address" maxlength="200" class="input mt-1" />
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Sale price</label>
            <input name="price" maxlength="60" class="input mt-1" />
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Notes</label>
            <textarea name="notes" rows="2" maxlength="2000" class="input mt-1"></textarea>
          </div>
          <div id="pc-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
          <div class="flex items-center justify-end gap-2 mt-1">
            <button type="button" id="pc-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" id="pc-submit" class="btn-primary">Save changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Log a call -->
  <div id="rk-modal" class="hidden" style="position:fixed;inset:0;z-index:57;">
    <div id="rk-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:440px;" class="px-4">
      <div class="bg-white rounded-2xl p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-1">
          <h3 class="text-[17px] font-bold">Log a call</h3>
          <button id="rk-close" class="btn-icon" style="width:32px;height:32px;border:none;"><i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i></button>
        </div>
        <p id="rk-who" class="text-[12.5px] text-muted mb-4"></p>
        <div class="flex flex-col gap-3">
          <div>
            <label class="text-[12px] font-semibold text-muted">Outcome</label>
            <select id="rk-outcome" class="input mt-1" style="cursor:pointer;">
              <option>Connected</option>
              <option>Voicemail</option>
              <option>No Answer</option>
              <option>Missed</option>
            </select>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-muted">Notes</label>
            <textarea id="rk-notes" rows="3" maxlength="2000" class="input mt-1" placeholder="What was discussed?"></textarea>
          </div>
          <div id="rk-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
          <div class="flex items-center justify-end gap-2 mt-1">
            <button type="button" id="rk-cancel" class="btn-secondary">Cancel</button>
            <button type="button" id="rk-save" class="btn-primary">Log call</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat with the loan officer -->
  <div id="rp-chat-modal" class="hidden" style="position:fixed;inset:0;z-index:56;">
    <div id="rp-chat-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:520px;" class="px-4">
      <div class="bg-white rounded-2xl shadow-2xl flex flex-col" style="height:70vh;max-height:580px;">
        <div class="flex items-center justify-between px-5 py-3" style="border-bottom:1px solid var(--border);">
          <h3 class="text-[16px] font-bold">Chat with <span id="rp-chat-officer">your loan officer</span></h3>
          <button id="rp-chat-close" class="btn-icon" style="width:32px;height:32px;border:none;"><i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i></button>
        </div>
        <div id="rp-chat" class="px-4 py-3 flex flex-col gap-2" style="flex:1;overflow-y:auto;"></div>
        <div id="rp-chat-emojis" class="px-3 pt-2 flex items-center gap-1 flex-wrap" style="border-top:1px solid var(--border);"></div>
        <div class="px-3 pb-3 pt-2 flex items-center gap-2">
          <input id="rp-chat-input" class="input" style="flex:1;" placeholder="Type a message…" maxlength="4000" autocomplete="off" />
          <button id="rp-chat-send" class="btn-primary" style="padding:8px 14px;"><i data-lucide="send" style="width:14px;height:14px;"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/realtor.js?v=20260616n"></script>
</body>
</html>
