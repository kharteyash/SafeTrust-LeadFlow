# Render Blueprint — deploys the Node web service.
# In Render: New → Blueprint → connect this repo. It reads this file and will
# prompt for the env vars marked `sync: false`.
services:
  - type: web
    name: leadflow
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Your Postgres connection string (use your Neon URL, ideally a separate
      # Neon project/branch for production). Paste it when prompted.
      - key: DATABASE_URL
        sync: false
      # Only needed for the Gmail integration — leave blank otherwise:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Scheduled email sending via Resend (optional). Leave blank to keep
      # scheduled messages as reminders only.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Protects /api/cron/dispatch. Render generates a random value; copy it
      # from the dashboard into your external cron's URL as ?key=...
      - key: CRON_SECRET
        generateValue: true
