# Render Blueprint — deploys the Node web service.
# In Render: New → Blueprint → connect this repo. It reads this file and will
# prompt for the env vars marked `sync: false`.
services:
  - type: web
    name: leadflow
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Your Postgres connection string (use your Neon URL, ideally a separate
      # Neon project/branch for production). Paste it when prompted.
      - key: DATABASE_URL
        sync: false
      # Only needed for the Gmail integration — leave blank otherwise:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Email sending. Preferred: SMTP (Google Workspace) — set SMTP_USER to your
      # Workspace email and SMTP_PASS to a Google App Password. Leave blank to fall
      # back to Resend (RESEND_API_KEY/RESEND_FROM), or blank for reminders only.
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Protects /api/cron/dispatch. Render generates a random value; copy it
      # from the dashboard into your external cron's URL as ?key=...
      - key: CRON_SECRET
        generateValue: true
