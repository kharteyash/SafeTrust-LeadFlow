<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Clients — LeadFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>try{if(localStorage.getItem('lf-theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">

    <!-- Page header -->
    <div class="flex items-start justify-between mb-6 flex-wrap gap-4">
      <div>
        <h1 class="text-[26px] font-bold tracking-tight">Clients</h1>
        <p class="text-[13.5px] text-muted mt-1">Your previously closed leads — imported from CSV. Duplicates are skipped automatically.</p>
      </div>
      <div class="flex items-center gap-2">
        <span id="closed-count" class="text-[12.5px] text-muted"></span>
        <input id="closed-file" type="file" accept=".csv,text/csv" class="hidden" />
        <button id="closed-import-btn" class="btn-primary">
          <i data-lucide="upload" style="width:14px;height:14px;"></i> Import CSV
        </button>
      </div>
    </div>

    <!-- Import status -->
    <div id="closed-msg" class="text-[12.5px] font-medium mb-3"></div>

    <!-- Search + bulk actions -->
    <div class="mb-3 flex items-center justify-between flex-wrap gap-3">
      <div class="relative" style="max-width:340px;flex:1 1 240px;">
        <i data-lucide="search" style="width:16px;height:16px;color:#8A8AA0;position:absolute;left:12px;top:50%;transform:translateY(-50%);"></i>
        <input id="closed-search" class="input pl-9" placeholder="Search clients by name..." />
      </div>
      <div id="closed-bulkbar"></div>
    </div>

    <!-- Table -->
    <div class="panel">
      <div class="overflow-x-auto">
        <table class="lf-table lf-cards" id="closed-table"></table>
      </div>
      <div id="closed-footer" class="p-4 flex items-center justify-between border-t flex-wrap gap-3 hidden" style="border-color:var(--border);">
        <span id="closed-summary" class="text-[12.5px] text-muted"></span>
        <div class="flex items-center gap-4">
          <div id="closed-pager" class="flex items-center gap-1"></div>
          <div class="flex items-center gap-2 text-[12.5px] text-muted">
            <span>Rows per page:</span>
            <select id="closed-rows-per-page" class="btn-secondary" style="padding:4px 8px;font-size:12px;cursor:pointer;">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Details modal -->
    <div id="closed-detail-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="closed-detail-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:520px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl" style="max-height:85vh;display:flex;flex-direction:column;">
          <div class="flex items-center justify-between mb-3 flex-shrink-0">
            <h3 id="closed-detail-title" class="text-[17px] font-bold">Client</h3>
            <button id="closed-detail-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <div id="closed-detail-body" class="overflow-y-auto" style="min-height:0;"></div>
        </div>
      </div>
    </div>

    <!-- Edit closed record modal -->
    <div id="closed-edit-modal" class="hidden" style="position:fixed;inset:0;z-index:52;">
      <div id="closed-edit-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:520px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl" style="max-height:85vh;display:flex;flex-direction:column;">
          <div class="flex items-center justify-between mb-3 flex-shrink-0">
            <h3 class="text-[17px] font-bold">Edit client</h3>
            <button id="closed-edit-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <form id="closed-edit-form" class="overflow-y-auto flex flex-col gap-3" style="min-height:0;"></form>
          <div id="closed-edit-msg" class="text-[12.5px] font-medium mt-2" style="color:#D63333;"></div>
          <div class="flex items-center justify-end gap-2 mt-3 flex-shrink-0">
            <button type="button" id="closed-edit-cancel" class="btn-secondary">Cancel</button>
            <button type="button" id="closed-edit-save" class="btn-primary">Save changes</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Log call modal -->
    <div id="closed-call-modal" class="hidden" style="position:fixed;inset:0;z-index:55;">
      <div id="closed-call-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:440px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-1">
            <h3 class="text-[17px] font-bold">Log call</h3>
            <button id="closed-call-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <p class="text-[12.5px] text-muted mb-4">Logging a call to <span id="closed-call-name" class="font-semibold" style="color:var(--text);"></span>.</p>
          <form id="closed-call-form" class="flex flex-col gap-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Outcome</label>
                <select name="outcome" class="input mt-1" style="cursor:pointer;">
                  <option value="Connected">Connected</option>
                  <option value="Voicemail">Voicemail</option>
                  <option value="No Answer">No Answer</option>
                </select>
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Duration</label>
                <input name="duration" maxlength="8" class="input mt-1" placeholder="m:ss" value="0:00" />
              </div>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Notes</label>
              <textarea name="notes" rows="3" maxlength="500" class="input mt-1" placeholder="What was discussed?"></textarea>
            </div>
            <div id="closed-call-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
            <div class="flex items-center justify-end gap-2 mt-2">
              <button type="button" id="closed-call-cancel" class="btn-secondary">Cancel</button>
              <button type="submit" class="btn-primary"><i data-lucide="phone-call" style="width:14px;height:14px;"></i> Log call</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/clients.js"></script>
</body>
</html>
