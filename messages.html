<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — LeadFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>try{if(localStorage.getItem('lf-theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">

    <!-- Page header -->
    <div class="flex items-start justify-between mb-6 flex-wrap gap-4">
      <div>
        <h1 class="text-[26px] font-bold tracking-tight">Messages</h1>
        <p class="text-[13.5px] text-muted mt-1">Unified inbox, templates, campaigns, and messaging analytics.</p>
      </div>
      <button id="new-msg-btn" class="btn-primary">
        <i data-lucide="calendar-clock" style="width:14px;height:14px;"></i> Schedule message
      </button>
    </div>

    <!-- Email delivery (Resend) health + test -->
    <div id="email-health" class="panel p-4 mb-5"></div>

    <!-- Tabs + body -->
    <div class="panel">
      <div class="p-4 flex items-center gap-5 flex-wrap" style="border-bottom:1px solid var(--border);">
        <div id="msg-tabs" class="flex items-center gap-5 flex-wrap"></div>
      </div>
      <div id="msg-body" class="p-5"></div>
    </div>

    <!-- New message modal -->
    <div id="msg-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="msg-modal-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:480px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-[17px] font-bold">Schedule message</h3>
            <button id="msg-modal-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <form id="msg-form" class="flex flex-col gap-3">
            <input type="hidden" name="channel" value="Email" />
            <div>
              <label class="text-[12px] font-semibold text-muted">To</label>
              <input name="recipient" required maxlength="120" class="input mt-1" placeholder="name@example.com" />
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Subject / type</label>
              <input name="type" required maxlength="80" class="input mt-1" placeholder="e.g. Follow-up, Pricing email" />
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Send date</label>
                <input name="date" type="date" required class="input mt-1" />
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Send time</label>
                <input name="time" type="time" required class="input mt-1" value="09:00" />
              </div>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Message</label>
              <textarea name="body" rows="3" maxlength="1000" class="input mt-1" placeholder="Write your message..."></textarea>
            </div>
            <p class="text-[11.5px] text-muted">Emails send automatically at the scheduled time (requires email setup).</p>
            <div id="msg-form-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
            <div class="flex items-center justify-end gap-2 mt-2">
              <button type="button" id="msg-cancel" class="btn-secondary">Cancel</button>
              <button type="submit" class="btn-primary">Schedule message</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/messages.js"></script>
</body>
</html>
