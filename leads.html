<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads — LeadFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>try{if(localStorage.getItem('lf-theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">

    <!-- Page header -->
    <div class="flex items-start justify-between mb-6 flex-wrap gap-4">
      <div>
        <h1 class="text-[26px] font-bold tracking-tight">Leads</h1>
        <p class="text-[13.5px] text-muted mt-1">Manage and follow up with your sales leads.</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="export-btn" class="btn-secondary">
          <i data-lucide="upload" style="width:14px;height:14px;"></i> Export
        </button>
        <button class="btn-secondary">
          <i data-lucide="download" style="width:14px;height:14px;"></i> Import
        </button>
        <button id="add-lead-btn" class="btn-primary">
          <i data-lucide="plus" style="width:14px;height:14px;"></i> Add Lead
        </button>
      </div>
    </div>

    <!-- Stat strip for leads -->
    <div id="lead-stats" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-5"></div>

    <!-- Lead table panel -->
    <div class="panel">
      <div class="p-5 pb-3 flex items-center flex-wrap gap-3">
        <div class="flex items-center gap-5 flex-wrap" id="lead-tabs"></div>
      </div>

      <div class="overflow-x-auto">
        <table class="lf-table" id="leads-table"></table>
      </div>

      <div class="p-4 flex items-center justify-between border-t flex-wrap gap-3" style="border-color:var(--border);">
        <span id="lead-summary" class="text-[12.5px] text-muted"></span>
        <div class="flex items-center gap-4">
          <div id="pager" class="flex items-center gap-1"></div>
          <div class="flex items-center gap-2 text-[12.5px] text-muted">
            <span>Rows per page:</span>
            <select id="rows-per-page" class="btn-secondary" style="padding:4px 8px;font-size:12px;cursor:pointer;">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Export leads modal -->
    <div id="export-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="export-modal-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:440px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-1">
            <h3 class="text-[17px] font-bold">Export leads</h3>
            <button id="export-modal-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <p class="text-[12.5px] text-muted mb-4">Choose which leads to include, then download as CSV.</p>
          <div id="export-options" class="flex flex-col gap-2"></div>
          <div id="export-msg" class="text-[12.5px] font-medium mt-3" style="color:#D63333;"></div>
          <div class="flex items-center justify-end gap-2 mt-4">
            <button type="button" id="export-cancel" class="btn-secondary">Cancel</button>
            <button type="button" id="export-go" class="btn-primary">
              <i data-lucide="download" style="width:14px;height:14px;"></i> Export CSV
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add lead modal -->
    <div id="lead-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="lead-modal-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:480px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-[17px] font-bold">Add lead</h3>
            <button id="lead-modal-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <form id="lead-form" class="flex flex-col gap-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Name</label>
                <input name="name" required maxlength="80" class="input mt-1" placeholder="Full name" />
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Email</label>
                <input name="email" type="email" required maxlength="120" class="input mt-1" placeholder="name@email.com" />
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Phone</label>
                <input name="phone" maxlength="40" class="input mt-1" placeholder="(555) 123-4567" />
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Owner</label>
                <input name="owner" maxlength="60" class="input mt-1" placeholder="Assigned agent" />
              </div>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Buying timeline</label>
              <select name="timeline" class="input mt-1" style="cursor:pointer;">
                <option value="Buying Immediately">Buying Immediately</option>
                <option value="1-3 Months">1-3 Months</option>
                <option value="3-6 Months">3-6 Months</option>
                <option value="6+ Months">6+ Months</option>
              </select>
              <div class="text-[11.5px] text-soft mt-1">Lead score is calculated automatically from the timeline and whether a phone number is provided.</div>
            </div>
            <div id="lead-form-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
            <div class="flex items-center justify-end gap-2 mt-2">
              <button type="button" id="lead-cancel" class="btn-secondary">Cancel</button>
              <button type="submit" class="btn-primary">Add lead</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/leads.js"></script>
</body>
</html>
