<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Calls — LeadFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>try{if(localStorage.getItem('lf-theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">

    <!-- Page header -->
    <div class="flex items-start justify-between mb-6 flex-wrap gap-4">
      <div>
        <h1 class="text-[26px] font-bold tracking-tight">Calls</h1>
        <p class="text-[13.5px] text-muted mt-1">Prioritize, queue, review, and analyze your calls.</p>
      </div>
    </div>

    <!-- Tabs + body -->
    <div class="panel">
      <div class="p-4 flex items-center gap-5 flex-wrap" style="border-bottom:1px solid var(--border);">
        <div id="calls-tabs" class="flex items-center gap-5"></div>
      </div>
      <div id="calls-body" class="p-5"></div>
    </div>

    <!-- Log call modal -->
    <div id="log-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="log-modal-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:460px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-[17px] font-bold">Log call</h3>
            <button id="log-modal-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <form id="log-form" class="flex flex-col gap-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Contact</label>
                <input name="name" required maxlength="80" class="input mt-1" placeholder="Contact name" />
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Phone</label>
                <input name="phone" maxlength="40" class="input mt-1" placeholder="(555) 123-4567" />
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Outcome</label>
                <select name="outcome" class="input mt-1" style="cursor:pointer;">
                  <option value="Connected">Connected</option>
                  <option value="Voicemail">Voicemail</option>
                  <option value="No Answer">No Answer</option>
                </select>
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Duration</label>
                <input name="duration" maxlength="8" class="input mt-1" placeholder="m:ss" value="0:00" />
              </div>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Notes</label>
              <textarea name="notes" rows="3" maxlength="500" class="input mt-1" placeholder="What was discussed?"></textarea>
            </div>
            <div id="log-form-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
            <div class="flex items-center justify-end gap-2 mt-2">
              <button type="button" id="log-cancel" class="btn-secondary">Cancel</button>
              <button type="submit" class="btn-primary">Log call</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Add to queue modal -->
    <div id="queue-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="queue-modal-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:460px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-[17px] font-bold">Add to call queue</h3>
            <button id="queue-modal-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <form id="queue-form" class="flex flex-col gap-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Name</label>
                <input name="name" required maxlength="80" class="input mt-1" placeholder="Contact name" />
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Phone</label>
                <input name="phone" maxlength="40" class="input mt-1" placeholder="(555) 123-4567" />
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Date</label>
                <input name="date" type="date" class="input mt-1" />
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Time</label>
                <input name="time" type="time" class="input mt-1" />
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Priority</label>
                <select name="priority" class="input mt-1" style="cursor:pointer;">
                  <option value="High">High</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="Low">Low</option>
                </select>
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Reason</label>
                <input name="reason" maxlength="120" class="input mt-1" placeholder="e.g. Contract follow-up" />
              </div>
            </div>
            <div id="queue-form-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
            <div class="flex items-center justify-end gap-2 mt-2">
              <button type="button" id="queue-cancel" class="btn-secondary">Cancel</button>
              <button type="submit" class="btn-primary">Add to queue</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Reschedule call modal -->
    <div id="reschedule-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="reschedule-modal-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:400px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-[17px] font-bold">Reschedule call</h3>
            <button id="reschedule-modal-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <form id="reschedule-form" class="flex flex-col gap-3">
            <p class="text-[13px] text-muted">Update <span id="reschedule-name" class="font-semibold" style="color:var(--text);"></span></p>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Date</label>
                <input name="date" type="date" required class="input mt-1" />
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Time</label>
                <input name="time" type="time" required class="input mt-1" />
              </div>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Reason</label>
              <input name="reason" maxlength="120" class="input mt-1" placeholder="e.g. Contract follow-up" />
            </div>
            <div id="reschedule-form-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
            <div class="flex items-center justify-end gap-2 mt-2">
              <button type="button" id="reschedule-cancel" class="btn-secondary">Cancel</button>
              <button type="submit" class="btn-primary">Save time</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Call detail modal -->
    <div id="call-detail-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="call-detail-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:440px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-[17px] font-bold">Call details</h3>
            <button id="call-detail-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <div id="call-detail-body"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/calls.js"></script>
</body>
</html>
