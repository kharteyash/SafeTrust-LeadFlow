<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaigns — LeadFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>try{if(localStorage.getItem('lf-theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">

    <!-- Page header -->
    <div class="flex items-start justify-between mb-6 flex-wrap gap-4">
      <div>
        <h1 class="text-[26px] font-bold tracking-tight">Campaigns</h1>
        <p class="text-[13.5px] text-muted mt-1">Create and track bulk email and SMS campaigns.</p>
      </div>
    </div>

    <div id="campaigns-body" class="panel p-5"></div>

    <!-- Create campaign modal -->
    <div id="campaign-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="campaign-modal-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:460px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-4">
            <h3 id="campaign-modal-title" class="text-[17px] font-bold">New campaign</h3>
            <button id="campaign-modal-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <form id="campaign-form" class="flex flex-col gap-3">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[12px] font-semibold text-muted">Campaign name</label>
                <input name="name" required maxlength="120" class="input mt-1" placeholder="e.g. Spring Buyer Outreach" />
              </div>
              <div>
                <label class="text-[12px] font-semibold text-muted">Audience</label>
                <select name="audience" id="campaign-audience" class="input mt-1" style="cursor:pointer;">
                  <option value="all">All leads</option>
                </select>
              </div>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Repeat</label>
              <select name="recurDays" id="campaign-recur" class="input mt-1" style="cursor:pointer;">
                <option value="0">One-time (send manually)</option>
                <option value="7">Weekly</option>
                <option value="14">Every 2 weeks</option>
                <option value="30">Monthly</option>
                <option value="90">Quarterly</option>
              </select>
              <div class="text-[11.5px] text-muted mt-1">Recurring campaigns auto-send to the audience on this cadence (needs Google connected).</div>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Subject</label>
              <input name="subject" maxlength="160" class="input mt-1" placeholder="e.g. A quick update on rates, {{first_name}}" />
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Message</label>
              <textarea name="body" rows="5" maxlength="4000" class="input mt-1" placeholder="Write your message here..."></textarea>
              <div class="text-[11.5px] text-muted mt-1">Personalize with <b>{{first_name}}</b>, <b>{{name}}</b>, <b>{{state}}</b> — filled in per recipient.</div>
            </div>
            <div>
              <label class="text-[12px] font-semibold text-muted">Note (optional, just for you)</label>
              <textarea name="note" rows="2" maxlength="1000" class="input mt-1" placeholder="Internal note — not sent to recipients."></textarea>
            </div>
            <div id="campaign-form-msg" class="text-[12.5px] font-medium" style="color:#D63333;"></div>
            <div class="flex items-center justify-end gap-2 mt-2">
              <button type="button" id="campaign-cancel" class="btn-secondary">Cancel</button>
              <button type="submit" id="campaign-submit" class="btn-primary">Create campaign</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Campaign detail modal -->
    <div id="campaign-detail-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
      <div id="campaign-detail-backdrop" style="position:absolute;inset:0;background:rgba(14,14,27,.45);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:560px;" class="px-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl" style="max-height:88vh;overflow-y:auto;">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-[17px] font-bold">Campaign details</h3>
            <button id="campaign-detail-close" class="btn-icon" style="width:32px;height:32px;border:none;">
              <i data-lucide="x" style="width:16px;height:16px;color:var(--text-muted);"></i>
            </button>
          </div>
          <div id="campaign-detail-body"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/campaigns.js"></script>
</body>
</html>
